name = "stockdash"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "stockdash-db"
database_id = "c8cb1355-ff85-4634-822a-eae233c90f8b"

[triggers]
# Every 15 min, 13:00-21:59 UTC, Mon-Fri — covers US market hours (9:30am-4pm ET)
# across both EDT and EST without needing DST-aware logic.
crons = ["*/15 13-21 * * 1-5"]

[vars]
# Alert emails go to each watchlist entry's owner (their Access login email).
# NOTE: the shared onboarding@resend.dev sender can only deliver to the Resend
# account owner's address — emailing other users requires a verified domain
# in Resend and a from address on that domain.
ALERT_FROM_EMAIL = "StockDash <onboarding@resend.dev>"
# Cloudflare Access app protecting this Worker's workers.dev route. The AUD
# tag comes from the Access application (Workers dashboard > Domains >
# Restricted, or Zero Trust > Access > Applications). Not secrets.
ACCESS_TEAM_DOMAIN = "johnagorecki"
ACCESS_AUD = "eae864422b7d3aa4ed9309aad25003c9b7fe095d9fc7c56faf3582221eb93117"
